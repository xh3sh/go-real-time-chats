{{ define "chat-header" }}
<div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 0 10px; flex-wrap: wrap;">
    <div style="flex: 1; text-align: center; min-width: 150px;">
        <span>{{ . }}</span>
    </div>
    <div style="font-size: 0.9em; white-space: nowrap;"
         hx-ext="sse" sse-connect="/api/users-online" sse-swap="message" hx-target="#user-count" hx-swap="innerHTML">
      <span>Онлайн: </span>
      <span id="user-count"></span>
    </div>
</div>
{{ end }}
